<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OurMarket Sell</title>

  <!-- Cropper CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f6f6;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: white;
      border-bottom: 1px solid gold;
    }

    .logo {
      font-weight: bold;
      color: green;
    }

    .back-btn {
      background: #333;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .image-box {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    #previewContainer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    .preview-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid gold;
      cursor: pointer;
    }

    #cropModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .crop-box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      max-width: 90%;
    }

    .crop-img {
      max-width: 100%;
    }

    .crop-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .save-btn {
      background: green;
      color: white;
    }

    .cancel-btn {
      background: red;
      color: white;
    }

    .form-container {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .post-btn {
      width: 100%;
      background: green;
      color: white;
      font-size: 16px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">OurMarket</div>
    <button class="back-btn" onclick="goBack()">Back</button>
  </div>

  <!-- IMAGE UPLOAD -->
  <div class="image-box">
    <input type="file" id="imageInput" accept="image/*" multiple>
    <div id="previewContainer"></div>
  </div>

  <!-- CROPPER MODAL -->
  <div id="cropModal">
    <div class="crop-box">
      <img id="cropImage" class="crop-img">
      <div class="crop-actions">
        <button class="cancel-btn" onclick="closeCrop()">Cancel</button>
        <button class="save-btn" onclick="saveCrop()">Save</button>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-container">
    <select id="category">
      <option>Phone</option>
      <option>Clothes</option>
      <option>Land</option>
      <option>House/Car</option>
      <option>Others</option>
    </select>

    <input id="name" placeholder="Product name">
    <input id="price" type="number" placeholder="Price (MWK)">
    <input id="phone" placeholder="WhatsApp number">
    <input id="location" placeholder="Location">

    <button class="post-btn" onclick="uploadProduct()">Post Product</button>
  </div>

  <!-- Cropper JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <!-- Firebase + App Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    const firebaseConfig = {
  apiKey: "AIzaSyCkvqdZoceAjEp_ANfSl0mjGVGrxP8vm_o",
  authDomain: "spaida-backend.firebaseapp.com",
  projectId: "spaida-backend",
  storageBucket: "spaida-backend.firebasestorage.app",
  messagingSenderId: "309426419976",
  appId: "1:309426419976:web:fc1bc37dddb83c454454bd",
  measurementId: "G-MTH2TTFVEX"
};

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);

    const db = getFirestore(app);
    const storage = getStorage(app);

    let cropper;
    let croppedImages = [];
    let tempIndex = null;

    window.goBack = () => {
      window.location.href = "feed.html";
    };

    window.openCrop = function(imgSrc, index) {
      tempIndex = index;
      const modal = document.getElementById("cropModal");
      const image = document.getElementById("cropImage");

      modal.style.display = "flex";
      image.src = imgSrc;

      image.onload = () => {
        if (cropper) cropper.destroy();
        cropper = new Cropper(image, {
          aspectRatio: 1,
          viewMode: 1
        });
      };
    };

    window.saveCrop = function() {
      const canvas = cropper.getCroppedCanvas({
        width: 500,
        height: 500
      });

      const cropped = canvas.toDataURL("image/png");
      croppedImages[tempIndex] = cropped;

      document.querySelectorAll(".preview-img")[tempIndex].src = cropped;

      window.closeCrop();
    };

    window.closeCrop = function() {
      document.getElementById("cropModal").style.display = "none";
      if (cropper) cropper.destroy();
    };

    window.uploadProduct = async function () {
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const phone = document.getElementById("phone").value;
      const location = document.getElementById("location").value;
      const category = document.getElementById("category").value;

      if (!name || !price) {
        alert("Fill required fields");
        return;
      }

      if (croppedImages.length === 0) {
        alert("Please select at least 1 image");
        return;
      }

      try {
        alert("Uploading... ⏳");

        let imageUrls = [];

        for (let i = 0; i < croppedImages.length; i++) {
          const imageRef = ref(storage, "products/" + Date.now() + "_" + i);

          await uploadString(imageRef, croppedImages[i], "data_url");

          const url = await getDownloadURL(imageRef);
          imageUrls.push(url);
        }

        await addDoc(collection(db, "products"), {
          name,
          price: Number(price),
          phone,
          location,
          category,
          images: imageUrls,
          createdAt: serverTimestamp()
        });

        alert("✅ Product uploaded!");

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("location").value = "";
        document.getElementById("previewContainer").innerHTML = "";
        croppedImages = [];

      } catch (error) {
        console.error(error);
        alert("❌ Error: " + error.message);
      }
    };

    document.getElementById("imageInput").addEventListener("change", function(e) {
      const files = Array.from(e.target.files);

      if (files.length > 2) {
        alert("Only 1 or 2 images allowed");
        this.value = "";
        return;
      }

      const container = document.getElementById("previewContainer");
      container.innerHTML = "";
      croppedImages = [];

      files.forEach((file, index) => {
        const reader = new FileReader();

        reader.onload = function(ev) {
          const img = document.createElement("img");
          img.src = ev.target.result;
          img.className = "preview-img";
          img.onclick = () => window.openCrop(ev.target.result, index);

          container.appendChild(img);
          croppedImages.push(ev.target.result);
        };

        reader.readAsDataURL(file);
      });
    });
  </script>
</body>
</html>
