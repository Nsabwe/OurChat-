<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Product</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f6f6f6;
}

/* TOP BAR */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:white;
  border-bottom:1px solid #ccc;
}

.logo {
  font-weight:bold;
  color:green;
}

.back-btn {
  background:green;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:6px;
}

/* BOXES */
.image-box, .form-container {
  background:white;
  margin:10px auto;
  padding:15px;
  border-radius:10px;
  max-width:500px;
}

/* UPLOAD BUTTON */
#imageInput {
  width:100%;
  padding:12px;
  background:green;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* PREVIEW */
#previewContainer {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
}

.preview-img {
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid #ccc;
  cursor:pointer;
}

/* CROPPER MODAL */
#cropModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.crop-box {
  background:white;
  padding:10px;
  border-radius:10px;
  max-width:90%;
}

.crop-img {
  max-width:100%;
}

.crop-actions {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

/* BUTTONS */
button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save-btn { background:green; color:white; }
.cancel-btn { background:red; color:white; }

.post-btn {
  width:100%;
  background:green;
  color:white;
}

/* INPUTS */
input, select {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
  font-size:16px;
}

/* PROGRESS */
#progressBox {
  margin-top:10px;
  display:none;
}

/* MOBILE */
@media (max-width:600px){
  .preview-img {
    width:100px;
    height:100px;
  }

  button {
    padding:12px;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">OurMarket</div>
  <button class="back-btn" onclick="goBack()">Back</button>
</div>

<!-- IMAGE UPLOAD -->
<div class="image-box">
  <input type="file" id="imageInput" accept="image/*" multiple>

  <div id="previewContainer"></div>

  <div id="progressBox">
    <div style="background:#ddd;height:10px;border-radius:5px;">
      <div id="progressBar" style="width:0%;height:10px;background:green;border-radius:5px;"></div>
    </div>
    <p id="progressText">0%</p>
  </div>
</div>

<!-- CROPPER -->
<div id="cropModal">
  <div class="crop-box">
    <img id="cropImage" class="crop-img">
    <div class="crop-actions">
      <button class="cancel-btn" onclick="closeCrop()">Cancel</button>
      <button class="save-btn" onclick="saveCrop()">Save</button>
    </div>
  </div>
</div>

<!-- FORM -->
<div class="form-container">

  <select id="category">
    <option>Phone</option>
    <option>Clothes</option>
    <option>Land</option>
    <option>House/Car</option>
    <option>Others</option>
  </select>

  <input id="name" placeholder="Product name">
  <input id="price" type="text" placeholder="Price (MWK)">
  <input id="phone" placeholder="Phone number">
  <input id="location" placeholder="Location">

  <button class="post-btn" onclick="uploadProduct()">Post Product</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
const API_URL ="https://server-upload-7.onrender.com/api/products";

let cropper;
let tempIndex = null;
let croppedImages = [];

window.goBack = () => window.location.href = "feed.html";

/* PRICE FORMAT */
const priceInput = document.getElementById("price");

function formatNumber(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

priceInput.addEventListener("input", (e) => {
  let value = e.target.value.replace(/[^0-9]/g, "");

  if (!value) {
    e.target.value = "";
    return;
  }

  e.target.value = "MWK " + formatNumber(value);
});

/* CROPPER */
window.openCrop = function(src, index) {
  tempIndex = index;
  const modal = document.getElementById("cropModal");
  const img = document.getElementById("cropImage");

  modal.style.display = "flex";
  img.src = src;

  img.onload = () => {
    if (cropper) cropper.destroy();
    cropper = new Cropper(img, { aspectRatio: 1 });
  };
};

window.saveCrop = function() {
  const canvas = cropper.getCroppedCanvas({ width: 500, height: 500 });
  const cropped = canvas.toDataURL("image/png");

  croppedImages[tempIndex] = cropped;
  document.querySelectorAll(".preview-img")[tempIndex].src = cropped;

  closeCrop();
};

window.closeCrop = function() {
  document.getElementById("cropModal").style.display = "none";
  if (cropper) cropper.destroy();
};

/* IMAGE INPUT */
document.getElementById("imageInput").addEventListener("change", function(e) {

  const files = Array.from(e.target.files);
  const container = document.getElementById("previewContainer");

  if (files.length > 2) {
    alert("Only 1–2 images allowed");
    return;
  }

  container.innerHTML = "";
  croppedImages = [];

  files.forEach((file, i) => {

    const reader = new FileReader();

    reader.onload = (ev) => {

      const img = document.createElement("img");
      img.src = ev.target.result;
      img.className = "preview-img";

      img.onclick = () => {
        if (confirm("Do you want to crop this image?")) {
          openCrop(ev.target.result, i);
        }
      };

      container.appendChild(img);
      croppedImages[i] = null;
    };

    reader.readAsDataURL(file);
  });
});

/* UPLOAD */
window.uploadProduct = async function() {

  const name = document.getElementById("name").value;
  const rawPrice = document.getElementById("price").value;
  const phone = document.getElementById("phone").value;
  const location = document.getElementById("location").value;
  const category = document.getElementById("category").value;

  let finalImages = croppedImages.map((img, i) => {
    return img || document.querySelectorAll(".preview-img")[i].src;
  });

  if (!name || !rawPrice) return alert("Fill required fields");
  if (finalImages.length === 0) return alert("Upload at least 1 image");

  const priceNumber = Number(rawPrice.replace(/[^0-9]/g, ""));
  const priceText = "MWK " + formatNumber(priceNumber);

  try {

    document.getElementById("progressBox").style.display = "block";

    let progress = 0;
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    const interval = setInterval(() => {
      if (progress < 95) {
        progress += Math.random() * 10;
        progressBar.style.width = progress + "%";
        progressText.innerText = Math.floor(progress) + "%";
      }
    }, 200);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        priceNumber,
        priceText,
        phone,
        location,
        category,
        images: finalImages,
        createdAt: new Date()
      })
    });

    clearInterval(interval);

    progressBar.style.width = "100%";
    progressText.innerText = "100%";

    if (!res.ok) throw new Error("Server error");

    alert("✅ Uploaded successfully!");

    document.getElementById("previewContainer").innerHTML = "";
    croppedImages = [];

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("location").value = "";

  } catch (err) {
    alert("❌ Error: " + err.message);
  }
};
</script>

</body>
</html>
